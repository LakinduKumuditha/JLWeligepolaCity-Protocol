<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Mobile - Sithkalu Companies</title>
    <link rel="stylesheet" href="main.css">
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
    <div id="boot-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#00f0ff; z-index:10000; display:flex; flex-direction:column; justify-content:center; align-items:center; font-family: 'Segoe UI', sans-serif;">
        <div id="arc-loader" style="width:100px; height:100px; border:5px solid #00f0ff; border-radius:50%; border-top-color:transparent;"></div>
        <h1 style="letter-spacing:5px; margin-top:20px;" class="loader_head">SITHKALU INDUSTRIES</h1>
        <p id="boot-status">SYSTEM STANDBY</p>
        <button id="init-button" style="background:transparent; border:2px solid #00f0ff; color:#00f0ff; padding:15px 40px; cursor:pointer; font-weight:bold; margin-top:20px; transition:0.3s;">INITIALIZE JARVIS</button>
    </div>
    
    <h1 class="heading_jarvis">Jarvis Mobile</h1>

    <h1 class="jarvis_response" id="js_res">Jarvis Response</h1>
    
    <div class="main-middle">
        
        <div class="arc-glow">
            <div class="reactor-container">
                <div class="idle" id="arc-reactor">
                    <div class="core-outer"></div>
                    <div class="core-inner"></div>

                    <div class="coil-container">
                        <div class="coil coil-1"></div>
                        <div class="coil coil-2"></div>
                        <div class="coil coil-3"></div>
                        <div class="coil coil-4"></div>
                        <div class="coil coil-5"></div>
                        <div class="coil coil-6"></div>
                        <div class="coil coil-7"></div>
                        <div class="coil coil-8"></div>
                    </div>

                    <div class="ring-1"></div>
                    <div class="ring-2"></div>
                </div>
            </div>
        </div>

        <div class="lakindu-welcome">
            <h1 style="color: whitesmoke; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Welcome Sir, Lakindu</h1>
        </div>

    </div>

    <footer>
        <div class="created_dir">
            <h3 style="color: orangered; padding: 5px;font-family: Arial, Helvetica, sans-serif; font-size: 15px;">Created By Lakindu Kumuditha</h3>
        </div>

        <div class="workstation_loc_dir">
            <h3 style="color: orangered; padding: 5px; font-family: Arial, Helvetica, sans-serif; font-size: 15px;">Workstation Location: Weligepola</h3>
        </div>
    </footer>
    
    <script src="function_.js"></script>

</body>
</html>
